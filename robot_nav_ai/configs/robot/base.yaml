# Robot Model Configuration
# Hydra config for robot hardware/sim model parameters

robot:
  name: "mobile_manipulator"
  model_path: "assets/robots/mobile_arm.xml"  # MuJoCo MJCF path

  # Base (mobile platform)
  base:
    type: "differential_drive"
    wheel_radius: 0.1          # metres
    wheel_separation: 0.4      # metres
    max_linear_velocity: 0.5   # m/s
    max_angular_velocity: 1.0  # rad/s

  # Arm
  arm:
    type: "6dof_serial"
    dof: 6
    joint_names:
      - "joint1"
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"
      - "joint6"
    max_joint_velocity: 1.0    # rad/s
    max_joint_torque: 50.0     # Nm
    control_frequency: 50      # Hz

  # Gripper
  gripper:
    type: "parallel_jaw"
    max_opening: 0.085         # metres
    max_force: 20.0            # N
    control_frequency: 50      # Hz

  # Sensors
  sensors:
    rgb_camera:
      enabled: true
      resolution: [640, 480]
      fov: 60.0                # degrees
      frame_id: "camera_rgb_optical_frame"
    depth_camera:
      enabled: true
      resolution: [640, 480]
      min_depth: 0.1           # metres
      max_depth: 5.0           # metres
      frame_id: "camera_depth_optical_frame"
    lidar:
      enabled: true
      num_beams: 360
      max_range: 10.0          # metres
      frame_id: "laser_frame"
    imu:
      enabled: true
      frame_id: "imu_link"

  # Workspace limits (metres, robot base frame)
  workspace:
    x_min: 0.2
    x_max: 0.8
    y_min: -0.4
    y_max: 0.4
    z_min: 0.0
    z_max: 1.2
